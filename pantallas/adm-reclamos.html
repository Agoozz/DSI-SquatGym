<div id="v-adm-reclamos" class="view-section hidden space-y-8 uppercase italic">
    <h3 class="text-4xl font-black tracking-tighter">Bandeja de <span class="text-orange-500">Reclamos</span></h3>

    <div id="lista-reclamos-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>
</div>

<div id="modal-comprobante" class="modal-base p-4">
    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 max-w-sm w-full relative shadow-2xl">
        <button onclick="cerrarM('modal-comprobante')" class="absolute top-2 right-4 text-slate-400 text-2xl hover:text-white">&times;</button>
        <p class="text-xs text-slate-400 font-bold uppercase mb-4 tracking-widest text-center">Comprobante Adjunto</p>
        <img id="img-comprobante-visor" src="" alt="Comprobante" class="w-full rounded-lg border border-slate-700 max-h-[80vh] object-contain">
    </div>
</div>
<div id="modal-rechazo-reclamo" class="hidden fixed inset-0 bg-slate-900/90 z-50 flex justify-center items-center p-4 backdrop-blur-sm">
    <div class="bg-slate-900 p-6 rounded-2xl border-2 border-red-500/50 max-w-md w-full shadow-2xl shadow-red-900/20">
        
        <div class="flex justify-between items-center mb-4">
            <h4 class="text-xl font-black text-red-500 italic tracking-tighter uppercase">Rechazar Pago</h4>
            <button onclick="cerrarModalRechazo()" class="text-slate-500 hover:text-white transition">
                <i class="fas fa-times-circle text-xl"></i>
            </button>
        </div>
        
        <p class="text-xs text-slate-400 mb-4 font-bold">Por favor, detalle el motivo del rechazo. Este mensaje será enviado al alumno.</p>
        
        <textarea id="input-motivo-rechazo" rows="4" placeholder="Ej: El comprobante está borroso, el monto no coincide..." 
                  class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white text-sm outline-none focus:border-red-500 transition resize-none mb-6"></textarea>
        
        <div class="flex gap-3">
            <button onclick="cerrarModalRechazo()" class="flex-1 border border-slate-700 text-slate-400 hover:bg-slate-800 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition">
                Cancelar
            </button>
            <button onclick="confirmarRechazo()" class="flex-1 bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-lg shadow-red-600/20">
                Confirmar
            </button>
        </div>
    
    </div>
</div>
