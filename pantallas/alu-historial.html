<div id="v-alu-historial" class="view-section space-y-8 italic uppercase">

      <div class="flex justify-between items-end">
          <div>
              <p class="text-[9px] font-black text-orange-500 tracking-[0.4em] mb-1">Mis Pagos</p>
              <h3 class="text-4xl font-black tracking-tighter text-white">Historial de <span class="text-orange-500">Pagos</span></h3>
          </div>
          <button onclick="exportarHistorialPDF()" class="btn-ui bg-slate-700 hover:bg-slate-600 text-xs px-5 py-3 border border-slate-600">
              <i class="fas fa-file-pdf mr-2 text-orange-400"></i>Exportar Historial
          </button>
      </div>

      <!-- KPIs -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="glass-card p-5 border-l-4 border-green-500">
              <p class="text-[8px] text-slate-500 font-black uppercase">Total Abonado</p>
              <p id="hist-kpi-total" class="text-2xl font-black text-green-400 mt-1">$95.000</p>
          </div>
          <div class="glass-card p-5 border-l-4 border-orange-500">
              <p class="text-[8px] text-slate-500 font-black uppercase">Cuotas Pagas</p>
              <p id="hist-kpi-pagas" class="text-2xl font-black text-white mt-1">7</p>
          </div>
          <div class="glass-card p-5 border-l-4 border-red-500">
              <p class="text-[8px] text-slate-500 font-black uppercase">Cuotas Pendientes</p>
              <p id="hist-kpi-pendientes" class="text-2xl font-black text-red-400 mt-1">1</p>
          </div>
          <div class="glass-card p-5 border-l-4 border-blue-500">
              <p class="text-[8px] text-slate-500 font-black uppercase">Método Frecuente</p>
              <p class="text-lg font-black text-white mt-1">QR</p>
          </div>
      </div>

      <!-- Filtros -->
      <div class="glass-card p-4">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
              <select id="hist-filter-metodo" onchange="renderHistorial()" class="bg-slate-900 border border-slate-700 rounded-full px-4 py-3 text-xs text-white outline-none focus:border-orange-500 transition">
                  <option value="todos">Todos los Métodos</option>
                  <option value="QR">QR</option>
                  <option value="Transferencia">Transferencia</option>
                  <option value="Tarjeta">Tarjeta</option>
                  <option value="Efectivo">Efectivo</option>
              </select>
              <select id="hist-filter-orden" onchange="renderHistorial()" class="bg-slate-900 border border-slate-700 rounded-full px-4 py-3 text-xs text-white outline-none focus:border-orange-500 transition">
                  <option value="fecha-desc">Más Reciente Primero</option>
                  <option value="fecha-asc">Más Antiguo Primero</option>
                  <option value="monto-desc">Mayor Monto</option>
              </select>
          </div>
      </div>

      <!-- Tabla historial -->
      <div class="glass-card overflow-hidden overflow-x-auto">
          <table class="w-full text-left min-w-[700px]">
              <thead class="bg-slate-900 text-[10px] text-slate-500 border-b border-slate-800 uppercase tracking-widest">
                  <tr>
                      <th class="p-4">N° Recibo</th>
                      <th class="p-4">Fecha</th>
                      <th class="p-4">Concepto</th>
                      <th class="p-4">Método</th>
                      <th class="p-4">Monto</th>
                      <th class="p-4">Estado</th>
                      <th class="p-4 text-right">Comprobante</th>
                  </tr>
              </thead>
              <tbody id="tabla-historial-body" class="text-xs font-bold divide-y divide-slate-800/50"></tbody>
          </table>
      </div>

  </div>
