<div id="v-adm-monitor" class="view-section space-y-8 italic uppercase">

      <div class="flex justify-between items-center">
          <h3 class="text-3xl font-black text-white">Informes <span class="text-orange-500">Financieros</span></h3>
      </div>

      <!-- Filtros -->
      <div class="glass-card p-4">
          <div class="flex flex-wrap items-center gap-2">
              <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Año:</label>
              <select id="inf-anio-sel" onchange="renderInformes()" class="bg-slate-900 border border-slate-700 rounded-full px-3 py-2 text-xs text-white outline-none focus:border-orange-500 transition w-20">
                  <option value="todos">Todos</option>
                  <option value="2024">2024</option>
                  <option value="2025">2025</option>
                  <option value="2026" selected>2026</option>
              </select>

              <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Mes:</label>
              <select id="inf-mes-sel" onchange="renderInformes()" class="bg-slate-900 border border-slate-700 rounded-full px-3 py-2 text-xs text-white outline-none focus:border-orange-500 transition w-24">
                  <option value="todos">Todos</option>
                  <option value="01">Ene</option>
                  <option value="02">Feb</option>
                  <option value="03">Mar</option>
                  <option value="04" selected>Abr</option>
                  <option value="05">May</option>
                  <option value="06">Jun</option>
                  <option value="07">Jul</option>
                  <option value="08">Ago</option>
                  <option value="09">Sep</option>
                  <option value="10">Oct</option>
                  <option value="11">Nov</option>
                  <option value="12">Dic</option>
              </select>

              <select id="inf-sede-sel" onchange="renderInformes()" class="bg-slate-900 border border-slate-700 rounded-full px-3 py-2 text-xs text-white outline-none focus:border-orange-500 transition w-36">
                  <option value="todas">Todas las Sedes</option>
                  <option value="Sede Centro">Sede Centro</option>
                  <option value="Sede Norte">Sede Norte</option>
                  <option value="Sede Sur">Sede Sur</option>
              </select>
              <select id="inf-estado-sel" onchange="renderInformes()" class="bg-slate-900 border border-slate-700 rounded-full px-3 py-2 text-xs text-white outline-none focus:border-orange-500 transition w-36">
                  <option value="todos">Todos los estados</option>
                  <option value="ACREDITADO">Acreditado</option>
                  <option value="PENDIENTE">Pendiente</option>
                  <option value="EN MORA">En mora</option>
              </select>
              <input id="inf-cliente-sel" oninput="renderInformes()" type="text" placeholder="Buscar cliente..."
                  class="bg-slate-900 border border-slate-700 rounded-full px-3 py-2 text-xs text-white outline-none focus:border-orange-500 transition placeholder-slate-600 w-52">
              <input id="inf-dni-sel" oninput="renderInformes()" type="text" placeholder="Buscar DNI..."
                  class="bg-slate-900 border border-slate-700 rounded-full px-3 py-2 text-xs text-white outline-none focus:border-orange-500 transition placeholder-slate-600 w-28">
          </div>
      </div>

      <!-- Tabla Detalle de Alumnos -->
      <div class="glass-card overflow-hidden">
          <div class="p-4 border-b border-slate-800 flex justify-between items-center">
              <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.3em]">
                  <i class="fas fa-users mr-2 text-orange-500"></i>Detalle de Alumnos
              </p>
          </div>
          <div class="overflow-x-auto">
              <table class="w-full text-left min-w-[750px]">
                  <thead class="bg-slate-900 text-[9px] text-slate-500 uppercase tracking-widest border-b border-slate-800">
                      <tr>
                          <th class="p-3">#</th>
                          <th class="p-3 cursor-pointer hover:text-white transition" onclick="cambiarOrden('fecha')">Fecha <i class="fas fa-sort ml-1 opacity-40"></i></th>
                          <th class="p-3 cursor-pointer hover:text-white transition" onclick="cambiarOrden('cliente')">Cliente <i class="fas fa-sort ml-1 opacity-40"></i></th>
                          <th class="p-3">DNI</th>
                          <th class="p-3">Sede</th>
                          <th class="p-3">Concepto</th>
                          <th class="p-3">Método</th>
                          <th class="p-3 text-right cursor-pointer hover:text-white transition" onclick="cambiarOrden('monto')">Monto <i class="fas fa-sort ml-1 opacity-40"></i></th>
                          <th class="p-3 cursor-pointer hover:text-white transition" onclick="cambiarOrden('estado')">Estado <i class="fas fa-sort ml-1 opacity-40"></i></th>
                      </tr>
                  </thead>
                  <tbody id="lista-transacciones" class="text-xs font-bold divide-y divide-slate-800/50"></tbody>
              </table>
          </div>
      </div>

      <!-- KPIs por método de pago -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 font-black">
          <div class="glass-card p-5 border-l-4 border-blue-500 text-center">
              <p class="text-[8px] text-slate-500">QR</p>
              <p id="inf-qr" class="text-2xl text-white mt-1">$0</p>
          </div>
          <div class="glass-card p-5 border-l-4 border-purple-500 text-center">
              <p class="text-[8px] text-slate-500">TRANSFERENCIA</p>
              <p id="inf-transfer" class="text-2xl text-white mt-1">$0</p>
          </div>
          <div class="glass-card p-5 border-l-4 border-green-500 text-center">
              <p class="text-[8px] text-slate-500">EFECTIVO</p>
              <p id="inf-efectivo" class="text-2xl text-white mt-1">$0</p>
          </div>
          <div class="glass-card p-5 border-l-4 border-orange-500 text-center">
              <p class="text-[8px] text-slate-500">TARJETA</p>
              <p id="inf-tarjeta" class="text-2xl text-white mt-1">$0</p>
          </div>
      </div>

      <!-- Totales Consolidados (Conectados con el Informe) -->
      <div class="glass-card p-5 border border-orange-500/40 grid grid-cols-2 md:grid-cols-4 gap-6">
          <div>
              <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Total Recaudado</p>
              <p id="inf-total-mes" class="text-3xl font-black text-green-400 mt-1">$0</p>
          </div>
          <div>
              <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Pendiente de Cobro</p>
              <p id="inf-total-pendiente" class="text-3xl font-black text-orange-400 mt-1">$0</p>
          </div>
          <div>
              <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">En Mora c/ Restricción</p>
              <p id="inf-total-mora" class="text-3xl font-black text-red-400 mt-1">$0</p>
          </div>
          <div class="text-right border-l border-slate-800 pl-6">
              <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Efectividad de Cobro</p>
              <p id="inf-efectividad" class="text-3xl font-black text-white mt-1">0%</p>
          </div>
      </div>

      <!-- Botones principales -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button onclick="abrirM('modal-seleccionar-mes-acreditados')"
              class="btn-ui bg-green-600 hover:bg-green-500 w-full py-4 text-xs font-black rounded-full tracking-widest transition-all shadow-lg shadow-green-500/20 flex justify-center items-center gap-3">
              <i class="fas fa-check-circle text-base"></i> Reporte Pagos Acreditados
          </button>
          <button onclick="abrirM('modal-seleccionar-anio-anual')"
              class="btn-ui bg-orange-600 hover:bg-orange-500 w-full py-4 text-xs font-black rounded-full tracking-widest transition-all shadow-lg shadow-orange-500/20 flex justify-center items-center gap-3">
              <i class="fas fa-chart-bar text-base"></i> Reporte Anual Consolidado
          </button>
      </div>

      <!-- Modal Seleccionar Mes Acreditados -->
      <div id="modal-seleccionar-mes-acreditados" class="modal-base">
          <div class="glass-card p-8 w-full max-w-sm bg-[#020617] border border-green-500/30 rounded-3xl shadow-2xl text-center">
              <h3 class="text-xl font-black text-white mb-6 uppercase tracking-widest">Seleccionar Mes</h3>
              <select id="modal-mes-acreditados-sel" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-green-500 transition mb-6">
                  <option value="01">Enero</option>
                  <option value="02">Febrero</option>
                  <option value="03">Marzo</option>
                  <option value="04" selected>Abril</option>
                  <option value="05">Mayo</option>
                  <option value="06">Junio</option>
                  <option value="07">Julio</option>
                  <option value="08">Agosto</option>
                  <option value="09">Septiembre</option>
                  <option value="10">Octubre</option>
                  <option value="11">Noviembre</option>
                  <option value="12">Diciembre</option>
              </select>
              <div class="flex gap-3">
                  <button onclick="cerrarM()" class="btn-ui bg-slate-700 w-full text-xs rounded-full uppercase font-black">Cancelar</button>
                  <button onclick="confirmarReportePagosAcreditados()" class="btn-ui bg-green-600 hover:bg-green-500 w-full text-xs rounded-full uppercase font-black">Generar</button>
              </div>
          </div>
      </div>

      <!-- Modal Seleccionar Año Anual -->
      <div id="modal-seleccionar-anio-anual" class="modal-base">
          <div class="glass-card p-8 w-full max-w-sm bg-[#020617] border border-orange-500/30 rounded-3xl shadow-2xl text-center">
              <h3 class="text-xl font-black text-white mb-6 uppercase tracking-widest">Seleccionar Año</h3>
              <select id="modal-anio-anual-sel" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition mb-6">
                  <option value="2024">2024</option>
                  <option value="2025">2025</option>
                  <option value="2026" selected>2026</option>
              </select>
              <div class="flex gap-3">
                  <button onclick="cerrarM()" class="btn-ui bg-slate-700 w-full text-xs rounded-full uppercase font-black">Cancelar</button>
                  <button onclick="confirmarReporteConsolidadoAnual()" class="btn-ui bg-orange-600 hover:bg-orange-500 w-full text-xs rounded-full uppercase font-black">Generar</button>
              </div>
          </div>
      </div>

  </div>
